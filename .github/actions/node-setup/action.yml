name: Node setup
description: Install Node.js and npm dependencies (run after actions/checkout)

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22.13.1
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
