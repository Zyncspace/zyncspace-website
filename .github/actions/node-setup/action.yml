name: Node setup
description: Checkout repository and install npm dependencies

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.13.1
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
