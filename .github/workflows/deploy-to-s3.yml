name: Deploy to S3

on:
  push:
    branches:
      - main
      - zyncspace_v2-website
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d out ]; then
            echo "Error: out/ directory was not created by the build."
            exit 1
          fi
          if [ ! -f out/index.html ]; then
            echo "Error: out/index.html is missing."
            exit 1
          fi
          echo "Build OK — $(find out -type f | wc -l) files ready to deploy"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build output to S3
        run: |
          aws s3 sync out/ "s3://${{ secrets.S3_BUCKET_NAME }}/" \
            --delete \
            --only-show-errors

          # Ensure HTML entry points are served correctly
          aws s3 cp out/index.html "s3://${{ secrets.S3_BUCKET_NAME }}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public,max-age=0,must-revalidate"

          if [ -f out/404.html ]; then
            aws s3 cp out/404.html "s3://${{ secrets.S3_BUCKET_NAME }}/404.html" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public,max-age=0,must-revalidate"
          fi

      - name: Configure S3 static website (index + error document)
        run: |
          aws s3 website "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --index-document index.html \
            --error-document 404.html

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

      - name: Deploy summary
        run: |
          echo "### Deployed to S3" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> If you see **Access Denied**, apply a public bucket policy once:" >> "$GITHUB_STEP_SUMMARY"
          echo "> \`./scripts/setup-s3-public-website.sh YOUR_BUCKET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "> Or use CloudFront OAC — see \`infra/s3-cloudfront-oac-bucket-policy.json\`" >> "$GITHUB_STEP_SUMMARY"
