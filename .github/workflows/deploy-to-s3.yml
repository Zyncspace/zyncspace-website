name: Deploy to S3 (manual)

# Automatic deploys run from the CI workflow after all checks pass.
# Use this workflow only for manual redeploys without re-running CI.

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Site URL (overrides branch default)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: ./.github/actions/resolve-site-url
        id: site
        with:
          input_site_url: ${{ inputs.site_url }}

      - uses: ./.github/actions/node-setup

      - name: Compress asset images
        run: npm run compress:assets

      - name: Print build environment
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "NEXT_PUBLIC_SITE_URL=${SITE_URL}"
          echo "Branch: ${REF_NAME}"

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ steps.site.outputs.url }}
          NEXT_PUBLIC_GA_ID: ${{ vars.GA_ID }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}

      - name: SEO audit
        run: npm run check:seo

      - uses: ./.github/actions/deploy-s3
        with:
          site_url: ${{ steps.site.outputs.url }}
