name: CI

on:
  push:
    branches: [main, zyncspace_v2-website]
  pull_request:
    branches: [main, zyncspace_v2-website]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/resolve-site-url
        id: site
        with:
          var_site_url: ${{ vars.SITE_URL }}

      - uses: ./.github/actions/node-setup

      - name: Compress asset images
        run: npm run compress:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ steps.site.outputs.url }}
          NEXT_PUBLIC_GA_ID: ${{ vars.GA_ID }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}

      - name: SEO audit
        run: npm run check:seo

      - name: Knip (dead code)
        run: npm run check:knip

      - name: JSCPD (duplicates)
        run: npm run check:jscpd

      - name: Madge (circular deps)
        run: npm run check:circular

      - name: Dependency Cruiser
        run: npm run check:deps

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: static-site
          path: out/
          retention-days: 7

  e2e:
    name: Playwright E2E
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/node-setup
      - uses: ./.github/actions/download-site

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

  lighthouse:
    name: Lighthouse CI
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/node-setup
      - uses: ./.github/actions/download-site

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true

  deploy:
    name: Deploy to S3
    needs: [quality, e2e, lighthouse]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/resolve-site-url
        id: site
        with:
          var_site_url: ${{ vars.SITE_URL }}

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: static-site
          path: out/

      - name: Print deploy environment
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying commit ${GITHUB_SHA} to S3 for ${SITE_URL} (${REF_NAME})"

      - uses: ./.github/actions/deploy-s3
        with:
          site_url: ${{ steps.site.outputs.url }}
          cloudfront_distribution_id: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}
          s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
