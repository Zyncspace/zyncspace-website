name: CI

on:
  push:
    branches: [main, zyncspace_v2-website]
  pull_request:
    branches: [main, zyncspace_v2-website]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/resolve-site-url
        id: site

      - uses: ./.github/actions/node-setup

      - name: Compress asset images
        run: npm run compress:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ steps.site.outputs.url }}
          NEXT_PUBLIC_GA_ID: ${{ vars.GA_ID }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}

      - name: SEO audit
        run: npm run check:seo

      - name: Knip (dead code)
        run: npm run check:knip

      - name: JSCPD (duplicates)
        run: npm run check:jscpd

      - name: Madge (circular deps)
        run: npm run check:circular

      - name: Dependency Cruiser
        run: npm run check:deps

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out/
          retention-days: 7

  e2e:
    name: Playwright E2E
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/node-setup
      - uses: ./.github/actions/download-site

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

  lighthouse:
    name: Lighthouse CI
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/node-setup
      - uses: ./.github/actions/download-site

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true

  deploy:
    name: Deploy to S3
    needs: [quality, e2e, lighthouse]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/resolve-site-url
        id: site

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out/

      - name: Print deploy environment
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying commit ${GITHUB_SHA} to S3 for ${SITE_URL} (${REF_NAME})"

      - uses: ./.github/actions/deploy-s3
        with:
          site_url: ${{ steps.site.outputs.url }}
